<div class="page">

  <!-- Barras de fondo difuminadas -->
  <div class="bars" aria-hidden="true">
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
  </div>

  <div class="card">

    <!-- Logo del cliente -->
    <div class="logo-area">
      <img src="logo_cliente.jpeg" alt="Como en Casa Restaurante" class="logo" />
    </div>

    <form (ngSubmit)="onSubmit()" autocomplete="off" novalidate>

      <!-- Username -->
      <div class="field">
        <span class="field-label">Username</span>
        <input
          type="text"
          class="field-input"
          [(ngModel)]="username"
          name="username"
          placeholder="Ingresa tu usuario"
          [disabled]="loading"
          autocomplete="off" />
      </div>

      <!-- Password -->
      <div class="field">
        <span class="field-label">Password</span>
        <div class="pw-wrap">
          <input
            [type]="showPassword ? 'text' : 'password'"
            class="field-input"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            [disabled]="loading"
            autocomplete="new-password" />
          <button type="button" class="eye" (click)="showPassword = !showPassword" tabindex="-1">
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="error-box" *ngIf="error">{{ error }}</div>

      <button type="submit" class="btn-submit" [disabled]="loading">
        <span *ngIf="!loading">Sign in</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

    </form>
  </div>
</div>
